<!DOCTYPE html>
<html>
<head>
    <title>Coordinator Login - SafeHarbor Lite</title>
</head>
<body>
    <h1>Coordinator Login</h1>

    <p>
        Enter the community center access code.
    </p>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <form method="POST">
        <p>
            <label for="access_code">Access Code</label>
            <input id="access_code" name="access_code" type="password" required>
        </p>

        <button type="submit">Login</button>
    </form>

    <p>
        <a href="/">Back to Home</a>
    </p>
</body>
</html>
