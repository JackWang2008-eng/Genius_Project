<!DOCTYPE html>
<html>
<head>
    <title>Coordinator Login - SafeHarbor Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container py-5">
        <section class="mx-auto" style="max-width: 520px;">
            <h1>Coordinator Login</h1>
            <p class="text-muted">Enter the community center access code.</p>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label" for="access_code">Access Code</label>
                            <input class="form-control" id="access_code" name="access_code" type="password" required>
                        </div>

                        <button class="btn btn-danger" type="submit">Login</button>
                    </form>
                </div>
            </div>

            <p class="mt-3">
                <a href="/">Back to Home</a>
            </p>
        </section>
    </main>
</body>
</html>
