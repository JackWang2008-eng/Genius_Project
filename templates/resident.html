<!DOCTYPE html>
<html>
<head>
    <title>Resident - SafeHarbor Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container py-5">
        <section class="mb-4">
            <h1>Resident Portal</h1>
        </section>

        <section class="row g-4">
            <div class="col-md-6">
                <div class="card h-100 border-danger">
                    <div class="card-body">
                        <h2 class="h4">I need help</h2>
                        <a href="/request" class="btn btn-danger">Submit Request</a>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card h-100 border-success">
                    <div class="card-body">
                        <h2 class="h4">I can offer community support</h2>
                        <a href="/volunteer" class="btn btn-success">Community Volunteer</a>
                    </div>
                </div>
            </div>
        </section>

        <p>
            <a href="/">Back to Home</a>
        </p>
    </main>
</body>
</html>
